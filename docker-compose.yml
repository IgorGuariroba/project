services:
  # Aplicação Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wave-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - wave-network
    depends_on:
      - db
      - redis

  # Servidor Web Nginx
  nginx:
    image: nginx:alpine
    container_name: wave-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - wave-network
    depends_on:
      - app

  # Banco de dados MySQL
  db:
    image: mysql:8.0
    container_name: wave-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wave_db
      MYSQL_ROOT_PASSWORD: wave_root_password
      MYSQL_USER: wave_user
      MYSQL_PASSWORD: wave_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - wave-network

  # Redis para cache e filas
  redis:
    image: redis:alpine
    container_name: wave-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - wave-network

  # Node.js para build de assets
  node:
    image: node:18-alpine
    container_name: wave-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - wave-network
    command: sh -c "npm install && npm run build"

networks:
  wave-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
